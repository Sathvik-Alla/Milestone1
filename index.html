<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Unified Anime Gateway</title>
    <style>
        :root {
            --primary-blue: #00aaff;
            --bg-dark: #0b0e14;
            --card-bg: #1a1d23;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            padding: 0;
        }
        nav {
            background-color: #000;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-blue);
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary-blue); }
        .search-bar {
            width: 40%;
            padding: 0.6rem;
            border-radius: 20px;
            border: 1px solid #333;
            background: #222;
            color: white;
        }
        .hero {
            padding: 4rem 5%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://via.placeholder.com/1200x400');
            background-size: cover;
            text-align: left;
        }
        .content-section { padding: 2rem 5%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 1rem;
        }
        .anime-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s;
            border: 1px solid #333;
        }
        .anime-card:hover { transform: scale(1.05); border-color: var(--primary-blue); }
        .anime-card img { width: 100%; height: 280px; object-fit: cover; }
        .anime-info { padding: 10px; font-size: 0.9rem; }
        .status-tag {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: #444;
            float: right;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">AnimeGateway</div>
        <input type="text" class="search-bar" placeholder="Search for anime (Overseerr Logic)...">
        <div class="nav-links">
   	 	<a href="login.html" style="color: white; text-decoration: none; margin-right: 15px;">Login</a>
    		<a href="register.html" style="color: var(--primary-blue); text-decoration: none; font-weight: bold;">Register</a>
	</div>
    </nav>

    <header class="hero">
        <h1>Continue Watching</h1>
        <p>Pick up right where you left off on Hulu or Crunchyroll.</p>
        <button style="padding: 10px 20px; background: var(--primary-blue); border: none; color: white; border-radius: 5px; cursor: pointer;">Play Latest Episode</button>
    </header>

    <main class="content-section">
        <h2>Your Library (Local + Cloud)</h2>
        <div class="grid">
            <div class="anime-card">
                <img src="https://via.placeholder.com/200x280" alt="Anime Poster">
                <div class="anime-info">
                    <span class="status-tag">Hulu</span>
                    <strong>Bleach: TYBW</strong>
                </div>
            </div>
            <div class="anime-card">
                <img src="https://via.placeholder.com/200x280" alt="Anime Poster">
                <div class="anime-info">
                    <span class="status-tag">Local</span>
                    <strong>Chainsaw Man</strong>
                </div>
            </div>
            <div class="anime-card">
                <img src="https://via.placeholder.com/200x280" alt="Anime Poster">
                <div class="anime-info">
                    <span class="status-tag">Crunchyroll</span>
                    <strong>Attack on Titan</strong>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
