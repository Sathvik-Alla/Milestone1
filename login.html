<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Unified Anime Gateway</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0b0e14; /* Dark theme suitable for anime streaming [cite: 3] */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #1a1d23;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 350px;
        }
        h2 { text-align: center; color: #00aaff; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; }
        input {
            width: 100%;
            padding: 0.5rem;
            border-radius: 4px;
            border: 1px solid #333;
            background: #252830;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.7rem;
            background-color: #00aaff;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 1rem;
        }
        button:hover { background-color: #0088cc; }
        .links { margin-top: 1rem; text-align: center; font-size: 0.9rem; }
        .links a { color: #00aaff; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Anime Gateway Login</h2>
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Login</button>
        </form>

        <div class="links">
            <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>
    </div>

</body>
</html>
